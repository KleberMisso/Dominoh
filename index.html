<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Dominó</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container-jogo">

    <h1>Dominó</h1>

    <!-- Parceiro (na sua frente) -->
    <div class="area-parceiro">
      <h2>Parceiro</h2>
      <div class="mao parceiro" id="mao-parceiro"></div>
    </div>

    <!-- Linha central (adversário esquerda + mesa + adversário direita) -->
    <div class="linha-central">

      <div class="area-adversario esquerda">
        <h2>Adversário</h2>
        <div class="mao adversario" id="mao-esquerda"></div>
      </div>

      <!-- SUA MESA (intocada) -->
      <div class="mesa" id="mesa">
        <div id="marcador-esquerda" class="marcador"></div>
        <div id="area-mesa"></div>
        <div id="marcador-direita" class="marcador"></div>
      </div>

      <div class="area-adversario direita">
        <h2>Adversário</h2>
        <div class="mao adversario" id="mao-direita"></div>
      </div>

    </div>

    <!-- SUA ÁREA (intocada) -->
    <div class="area-jogador">
      <h2>Sua mão</h2>
      <div class="mao jogador" id="mao-jogador"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
